<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title">
  <title id="title">Micah Woods photo</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a2e2a"/>
      <stop offset="0.45" stop-color="#1c2628"/>
      <stop offset="1" stop-color="#0a1213"/>
    </linearGradient>
    <radialGradient id="rim" cx="78%" cy="22%" r="58%">
      <stop offset="0" stop-color="#18cbd4" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#18cbd4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#caa080"/>
      <stop offset="0.55" stop-color="#a87f60"/>
      <stop offset="1" stop-color="#5a3f2c"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2e25"/>
      <stop offset="1" stop-color="#1a120c"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a3438"/>
      <stop offset="1" stop-color="#06181a"/>
    </linearGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffd2a5" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#ffd2a5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="256" height="256" fill="url(#bg)"/>
  <rect width="256" height="256" fill="url(#rim)"/>

  <!-- Shoulders / shirt -->
  <path d="M28 256 C28 200 70 178 128 178 C186 178 228 200 228 256 Z" fill="url(#shirt)"/>
  <!-- Collar shadow -->
  <path d="M86 198 C100 188 112 184 128 184 C144 184 156 188 170 198 L160 214 L128 206 L96 214 Z" fill="#04101180"/>

  <!-- Neck -->
  <path d="M108 168 L108 188 C108 196 118 202 128 202 C138 202 148 196 148 188 L148 168 Z" fill="url(#skin)"/>
  <path d="M108 188 C112 196 144 196 148 188 L148 196 C140 202 116 202 108 196 Z" fill="#00000028"/>

  <!-- Head -->
  <path d="M82 116 C82 80 102 56 128 56 C154 56 174 80 174 116 L174 134 C174 156 156 178 128 178 C100 178 82 156 82 134 Z" fill="url(#skin)"/>

  <!-- Cheek warmth -->
  <ellipse cx="103" cy="142" rx="14" ry="10" fill="url(#cheek)"/>
  <ellipse cx="153" cy="142" rx="14" ry="10" fill="url(#cheek)"/>

  <!-- Hair -->
  <path d="M82 116 C80 80 100 50 130 50 C160 50 178 76 176 110 C172 96 158 86 142 88 C130 90 118 86 108 90 C94 96 86 106 82 116 Z" fill="url(#hair)"/>
  <path d="M84 110 C90 100 102 92 116 90 L116 96 C108 100 100 106 90 116 Z" fill="#00000040"/>

  <!-- Eyebrows -->
  <path d="M96 124 C102 121 112 121 118 124" stroke="#1f140e" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M138 124 C144 121 154 121 160 124" stroke="#1f140e" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Eyes -->
  <ellipse cx="107" cy="134" rx="4.2" ry="3.4" fill="#0a0606"/>
  <ellipse cx="149" cy="134" rx="4.2" ry="3.4" fill="#0a0606"/>
  <circle cx="108.4" cy="132.8" r="1" fill="#ffffff" opacity="0.85"/>
  <circle cx="150.4" cy="132.8" r="1" fill="#ffffff" opacity="0.85"/>

  <!-- Nose -->
  <path d="M128 138 L124 154 C124 158 132 158 132 154 Z" fill="#00000022"/>
  <path d="M124 154 C124 158 132 158 132 154" stroke="#00000040" stroke-width="1" fill="none"/>

  <!-- Mouth -->
  <path d="M114 162 C122 168 134 168 142 162" stroke="#3a1a14" stroke-width="2.4" stroke-linecap="round" fill="none"/>
  <path d="M114 162 C122 165 134 165 142 162 L138 165 C132 168 124 168 118 165 Z" fill="#7a342a" opacity="0.55"/>

  <!-- Beard shadow -->
  <path d="M96 158 C104 174 118 180 128 180 C138 180 152 174 160 158 C156 168 144 174 128 174 C112 174 100 168 96 158 Z" fill="#1a0e0888" opacity="0.55"/>

  <!-- Cyan rim light on left edge -->
  <path d="M82 116 C82 96 90 78 102 66 C90 80 84 100 84 122 L84 146 Z" fill="#18cbd4" opacity="0.18"/>
</svg>
